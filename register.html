<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Club — Da Bears Score Club</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="bear-icon">🐻</span>
    <span class="logo-text">Da <span>Bears</span> Club</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="games.html">Pick Scores</a></li>
    <li><a href="rankings.html">Rankings</a></li>
    <li><a href="members.html">Members</a></li>
  </ul>
  <div class="nav-auth" id="nav-auth"></div>
</nav>

<div class="form-container">
  <span class="form-top-icon">🐻</span>

  <div class="form-card">
    <h1 class="form-title">Join the Club</h1>
    <p class="form-subtitle">Just type your name — that's it!</p>

    <div id="msg"></div>

    <form id="reg-form">
      <div class="form-group">
        <label class="form-label" for="displayName">Your Name</label>
        <input type="text" id="displayName" class="form-input" placeholder="e.g. Mike Ditka" maxlength="30" required autofocus>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:0.85rem;margin-top:0.25rem;font-size:0.95rem">
        Join the Club — Free!
      </button>
    </form>

    <hr class="divider">
    <p style="text-align:center;color:var(--gray);font-size:0.88rem">
      Already joined?
      <a href="login.html" style="color:var(--orange);font-weight:700">Sign back in</a>
    </p>
  </div>

  <p style="text-align:center;color:var(--gray);font-size:0.78rem;margin-top:1rem">
    100% free. No credit card. No spam. Bear Down! 🐻
  </p>
</div>

<script src="app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await DB_READY;
    if (isLoggedIn()) { window.location.href = 'games.html'; return; }

    document.getElementById('reg-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('displayName').value;
      const msg  = document.getElementById('msg');
      const btn  = e.target.querySelector('button[type="submit"]');

      btn.disabled = true;
      btn.textContent = 'Saving...';

      const res = await register(name);
      if (res.ok) {
        msg.innerHTML = '<div class="alert alert-success">🎉 Welcome to Da Bears Club! Taking you to the picks...</div>';
        setTimeout(() => location.href = 'games.html', 1400);
      } else {
        msg.innerHTML = `<div class="alert alert-error">⚠️ ${res.err}</div>`;
        btn.disabled = false;
        btn.textContent = 'Join the Club — Free!';
      }
    });
  });
</script>

</body>
</html>
